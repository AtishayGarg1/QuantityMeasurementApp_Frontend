<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Quantum Measure</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="auth-card">
        <h1>Create Account</h1>
        <p>Join the future of precision measurement</p>

        <form id="signupForm">
            <div id="errorMsg" class="error-msg">Failed to create account. Please try again.</div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="index.html">Log in</a>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                const errorEl = document.getElementById('errorMsg');
                errorEl.innerText = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            const result = await register(email, password);
            if (result.success) {
                alert('Account created successfully! Redirecting to login...');
                window.location.href = 'index.html';
            } else {
                const errorEl = document.getElementById('errorMsg');
                errorEl.innerText = result.message || 'Signup failed. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
